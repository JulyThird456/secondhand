<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 474" fill="none">
  <rect width="600" height="474" fill="#FFC200" rx="8"/>
  <!-- Decorative food delivery illustration -->
  <circle cx="300" cy="220" r="120" fill="#FFF" opacity="0.2"/>
  <circle cx="300" cy="220" r="80" fill="#FFF" opacity="0.3"/>
  <!-- Food box -->
  <rect x="230" y="150" width="140" height="100" rx="12" fill="#FFF" opacity="0.9"/>
  <rect x="230" y="140" width="140" height="20" rx="6" fill="#FFF" opacity="0.7"/>
  <!-- Food items -->
  <circle cx="270" cy="185" r="15" fill="#FF6B35" opacity="0.8"/>
  <circle cx="310" cy="185" r="15" fill="#FF6B35" opacity="0.8"/>
  <circle cx="350" cy="185" r="15" fill="#FF6B35" opacity="0.8"/>
  <rect x="260" y="210" width="100" height="8" rx="4" fill="#333" opacity="0.1"/>
  <rect x="270" y="225" width="80" height="8" rx="4" fill="#333" opacity="0.1"/>
  <!-- Carts / delivery -->
  <rect x="180" y="330" width="90" height="60" rx="8" fill="#FFF" opacity="0.4"/>
  <circle cx="210" cy="395" r="10" fill="#333" opacity="0.3"/>
  <circle cx="245" cy="395" r="10" fill="#333" opacity="0.3"/>
  <rect x="340" y="330" width="90" height="60" rx="8" fill="#FFF" opacity="0.4"/>
  <circle cx="370" cy="395" r="10" fill="#333" opacity="0.3"/>
  <circle cx="405" cy="395" r="10" fill="#333" opacity="0.3"/>
  <!-- Title text -->
  <text x="300" y="100" font-family="Arial" font-size="32" font-weight="bold" fill="#FFF" text-anchor="middle">苍穹外卖管理系统</text>
  <text x="300" y="130" font-family="Arial" font-size="16" fill="#FFF" opacity="0.8" text-anchor="middle">高效 · 智能 · 便捷</text>
  <!-- Small decorative dots -->
  <circle cx="120" cy="80" r="4" fill="#FFF" opacity="0.3"/>
  <circle cx="480" cy="80" r="4" fill="#FFF" opacity="0.3"/>
  <circle cx="100" cy="400" r="3" fill="#FFF" opacity="0.2"/>
  <circle cx="500" cy="400" r="3" fill="#FFF" opacity="0.2"/>
  <circle cx="530" cy="120" r="5" fill="#FFF" opacity="0.2"/>
</svg>
